<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#0f172a;
    font-family:'Kanit',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    position:relative;
}

/* พื้นหลัง */

.bg{
    position:absolute;
    width:500px;
    height:500px;
    background:#ff4d8d;
    border-radius:50%;
    filter:blur(180px);
    opacity:0.2;
}

/* กล่อง */

.container{
    position:relative;
    z-index:999;
    text-align:center;
    padding:40px;
}

/* หัว */

h1{
    font-size:60px;
    margin-bottom:20px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{

    from{
        text-shadow:0 0 10px #ff4d8d;
    }

    to{
        text-shadow:0 0 35px #ff99cc;
    }

}

#text{
    font-size:30px;
}

/* ปุ่ม */

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:18px;
    background:#ff4d8d;
    color:white;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
    position:relative;
    z-index:1000;
}

button:hover{
    transform:scale(1.08);
}

/* emoji */

.emoji{
    position:absolute;
    pointer-events:none;
    animation:floatUp 3s linear forwards;
}

@keyframes floatUp{

    0%{
        transform:translateY(0) scale(0.5);
        opacity:1;
    }

    100%{
        transform:translateY(-900px) scale(1.5) rotate(360deg);
        opacity:0;
    }

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

    <h1>❤️  Welcome My Love  ❤️</h1>

    <p id="text">เหนื่อยไหมคะเบ๊บ 🥺</p>

    <button id="btn" onclick="nextStep()">
        กดตรงนี้สิ 💖
    </button>

</div>

<script>

let step = 0;

function nextStep(){

    const text =
    document.getElementById("text");

    const btn =
    document.getElementById("btn");

    // หน้า 2

    if(step === 0){

        text.innerHTML =
        "สู้ๆนะค้าบ หนูอยู่ข้างๆเสมอ ✨";

        btn.innerHTML =
        "กดอีกทีสิ 💕";

        step++;

    }

    // หน้า 3

    else{

        text.innerHTML =
        "เก่งที่สุดเลยยย 💖";

        btn.style.display = "none";

        startEmojiSpam();

    }

}

function startEmojiSpam(){

    const emojis = [
        "💖","✨","🥺","❤️",
        "🌸","💗","🫶","💕"
    ];

    setInterval(() => {

        const emoji =
        document.createElement("div");

        emoji.className = "emoji";

        emoji.innerHTML =
        emojis[Math.floor(Math.random()*emojis.length)];

        emoji.style.left =
        Math.random()*100 + "vw";

        emoji.style.top =
        "100vh";

        emoji.style.fontSize =
        (Math.random()*40 + 20) + "px";

        document.body.appendChild(emoji);

        setTimeout(() => {

            emoji.remove();

        },3000);

    },120);

}

</script>

</body>
</html>
