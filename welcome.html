<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    overflow:hidden;
    background:#0f172a;
    font-family:'Kanit',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
    position:relative;
}

/* พื้นหลัง glow */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#ff4d8d;
    filter:blur(180px);
    opacity:0.2;
    border-radius:50%;
    z-index:0;
}

.container{
    text-align:center;
    position:relative;
    z-index:2;
    padding:40px;
}

h1{
    font-size:60px;
    margin-bottom:20px;
    animation:glow 2s infinite alternate;
}

#text{
    font-size:32px;
    margin-top:10px;
    transition:0.3s;
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:18px;
    background:#ff4d8d;
    color:white;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px rgba(255,77,141,0.5);
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 40px rgba(255,77,141,0.8);
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #ff4d8d;
    }

    to{
        text-shadow:0 0 30px #ff99cc;
    }
}

/* emoji */

.emoji{
    position:absolute;
    font-size:30px;
    animation:floatUp 3s linear forwards;
    pointer-events:none;
    z-index:1;
}

@keyframes floatUp{

    0%{
        transform:translateY(0) scale(0.5) rotate(0deg);
        opacity:1;
    }

    100%{
        transform:translateY(-900px) scale(1.5) rotate(360deg);
        opacity:0;
    }

}

</style>
</head>
<body>

<div class="container">

    <h1>Welcome My Love ❤️</h1>

    <p id="text">เหนื่อยไหมคะเบ๊บ 🥺</p>

    <button id="btn" onclick="nextStep()">กดตรงนี้สิ 💖</button>

</div>

<script>

let step = 0;

function nextStep(){

    const text = document.getElementById("text");
    const btn = document.getElementById("btn");

    // หน้า 2
    if(step === 0){

        text.innerHTML = "สู้ๆนะค้าบ เค้าอยู่ข้างๆเสมอ ✨";
        btn.innerHTML = "อีกอันนึงง 💕";

        step = 1;

    }

    // หน้า 3
    else if(step === 1){

        text.innerHTML = "เก่งที่สุดเลยยย 💖";

        btn.style.display = "none";

        startEmojiSpam();

    }

}

function startEmojiSpam(){

    const emojis = [
        "💖","✨","🥺","❤️",
        "🌸","💗","🫶","💕",
        "💞","⭐"
    ];

    setInterval(() => {

        const emoji = document.createElement("div");

        emoji.classList.add("emoji");

        emoji.innerHTML =
            emojis[Math.floor(Math.random() * emojis.length)];

        emoji.style.left = Math.random() * 100 + "vw";

        emoji.style.top = "100vh";

        emoji.style.fontSize =
            (Math.random() * 35 + 20) + "px";

        document.body.appendChild(emoji);

        setTimeout(() => {
            emoji.remove();
        },3000);

    },120);

}

</script>

</body>
</html>
